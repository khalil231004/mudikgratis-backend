quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.hibernate-orm.database.generation=update


# =============================================================
# JWT ? HMAC HS256 (symmetric key)
# FIX #1: Tambahkan smallrye.jwt.sign.key.type=secret
# agar Quarkus tahu key-nya adalah raw secret (bukan PKCS8)
# FIX #2: smallrye.jwt.verify.algorithm harus EKSPLISIT HS256
# =============================================================
mp.jwt.verify.issuer=https://dishubosrm.acehprov.go.id
smallrye.jwt.sign.key=r7NmAExOMIt9qJiz0Hbyhf5f/lhUFcO8K4HhtSaqBHQ=
smallrye.jwt.verify.key=r7NmAExOMIt9qJiz0Hbyhf5f/lhUFcO8K4HhtSaqBHQ=
# WAJIB: Tanpa ini Quarkus mencoba parse key sebagai RSA PKCS8 -> JWT selalu 401!
smallrye.jwt.sign.key.type=secret
smallrye.jwt.verify.key.type=secret
smallrye.jwt.verify.algorithm=HS256


app.base.url=https://dishubosrm.acehprov.go.id
app.frontend.url=https://seulamat.dishubaceh.com

# --- EMAIL ---
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=465
quarkus.mailer.ssl=true
quarkus.mailer.mock=false
quarkus.mailer.from=${MAIL_USERNAME}
quarkus.mailer.username=${MAIL_USERNAME}
quarkus.mailer.password=${MAIL_PASSWORD}

quarkus.http.host=0.0.0.0
quarkus.http.body.uploads-directory=/opt/mudik-v2/uploads
quarkus.http.limits.max-body-size=20M
quarkus.http.read-timeout=60s

# =============================================================
# CORS ? BUILT-IN QUARKUS
# FIX #3: Tambahkan origin kedua (backend domain) dan wildcard localhost untuk dev
# =============================================================
quarkus.http.cors=true
quarkus.http.cors.origins=https://seulamat.dishubaceh.com,https://dishubosrm.acehprov.go.id
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
quarkus.http.cors.headers=origin,content-type,accept,authorization,userid,x-requested-with
quarkus.http.cors.exposed-headers=content-disposition,content-type
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H

# =============================================================
# AUTH PERMISSIONS
# proactive=false: auth check hanya dilakukan jika endpoint membutuhkan
# =============================================================
quarkus.http.auth.proactive=false

# --- PUBLIC (tanpa token) ---
# FIX #4: Tambahkan /api/public/* ke permit list agar tidak 401
quarkus.http.auth.permission.public.paths=/api/auth/*,/api/rute,/api/portal/status,/api/feedback/publik,/api/feedback/stats,/api/peta/*,/api/public/*
quarkus.http.auth.permission.public.policy=permit

# --- USER endpoints (wajib token) ---
quarkus.http.auth.permission.authenticated.paths=/api/user/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# --- PENDAFTARAN endpoints (wajib token) ---
# FIX #5: /api/pendaftaran/* wajib authenticated (sebelumnya tidak ada rule ini!)
quarkus.http.auth.permission.pendaftaran.paths=/api/pendaftaran/*
quarkus.http.auth.permission.pendaftaran.policy=authenticated

# --- ADMIN endpoints (wajib token) ---
quarkus.http.auth.permission.admin.paths=/api/admin/*
quarkus.http.auth.permission.admin.policy=authenticated

# --- CORS FIX: Izinkan OPTIONS preflight untuk semua /api/* tanpa auth ---
# Preflight tidak pernah membawa Authorization header ? wajib permit
quarkus.http.auth.permission.options-preflight.paths=/api/*
quarkus.http.auth.permission.options-preflight.methods=OPTIONS
quarkus.http.auth.permission.options-preflight.policy=permit
