quarkus.http.host=0.0.0.0
# Folder upload wajib absolute path di VPS
quarkus.http.body.uploads-directory=/opt/mudik-v2/uploads
# Batas ukuran file upload (Set ke 20MB)
quarkus.http.limits.max-body-size=20M
# Timeout request diperlama (biar gak putus tengah jalan pas sinyal bapuk)
quarkus.http.read-timeout=60s

# --- ? CORS CONFIG (ANTI PREFLIGHT ERROR) ---
quarkus.http.cors=true
quarkus.http.cors.origins=https://seulamat.dishubaceh.com,http://localhost:5173
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with, userid
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.auth.proactive=false

# --- DAFTAR URL YANG BEBAS AKSES (PUBLIC) ---
# Masukkan semua endpoint disini biar gak dicegat server
# 1. Auth & Umum: Login, Register, Rute
# 2. Pendaftaran User: Riwayat, Upload, QR Code
# 3. Admin: Users, Pendaftar, Verifikasi, Kendaraan, Bus, Stats, Export
quarkus.http.auth.permission.public.paths=\
/api/auth/*,\
/api/rute,\
/api/rute/*,\
/api/pendaftaran/riwayat,\
/api/pendaftaran/uploads/*,\
/api/pendaftaran/uuid/*,\
/api/admin/users,\
/api/admin/users/*,\
/api/admin/pendaftar,\
/api/admin/verifikasi-keluarga/*,\
/api/admin/kendaraan,\
/api/admin/kendaraan/*,\
/api/admin/assign-bus,\
/api/admin/stats,\
/api/admin/export

# Izinkan semua path diatas (PERMIT)
quarkus.http.auth.permission.public.policy=permit

# --- DAFTAR URL YANG WAJIB LOGIN ---
# Sisanya kita kunci (Opsional, buat jaga-jaga)
# --- DAFTAR URL YANG WAJIB LOGIN ---
# Tambahkan /api/user/* disini agar Satpam tau endpoint ini butuh token
quarkus.http.auth.permission.authenticated.paths=/api/user/*,/api/secure/*
quarkus.http.auth.permission.authenticated.policy=authenticated
