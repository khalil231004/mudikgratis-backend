quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.hibernate-orm.database.generation=update

# =============================================================
# JWT ? HMAC HS256 (symmetric key)
# Secret wajib dari ENV, tidak boleh hardcode di file ini
# =============================================================
mp.jwt.verify.issuer=https://dishubosrm.acehprov.go.id
smallrye.jwt.sign.key=${JWT_SECRET}
smallrye.jwt.verify.key=${JWT_SECRET}
smallrye.jwt.verify.algorithm=HS256

app.base.url=https://dishubosrm.acehprov.go.id
app.frontend.url=https://seulamat.dishubaceh.com
app.frontend.url.mudik=https://mudik.dishubaceh.com

# =============================================================+
# SAPA WhatsApp Blast API
# Dokumentasi: https://sapa.acehprov.go.id/dokumentasiAPI
# =============================================================
sapa.api.auth.url=https://sapa.acehprov.go.id/Api/Auth
sapa.api.kirim.url=https://sapa.acehprov.go.id/Api/WhatsApp/KirimPesan
sapa.api.email=${SAPA_EMAIL}
sapa.api.password=${SAPA_PASSWORD}

# =============================================================
# EMAIL (Gmail SMTP)
# FIX MAIL_FROM_NAME: format "Nama <email>" agar nama pengirim
# tampil rapi di inbox penerima, bukan hanya alamat email mentah
# =============================================================
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=465
quarkus.mailer.ssl=true
quarkus.mailer.mock=false
quarkus.mailer.from=${MAIL_FROM_NAME} <${MAIL_USERNAME}>
quarkus.mailer.username=${MAIL_USERNAME}
quarkus.mailer.password=${MAIL_PASSWORD}
# Config property custom untuk inject ke AuthResource.java
mail.from.name=${MAIL_FROM_NAME}

quarkus.http.host=0.0.0.0
quarkus.http.body.uploads-directory=/opt/mudik-v2/uploads
quarkus.http.limits.max-body-size=5M
quarkus.http.read-timeout=60s

# =============================================================
# CORS ? BUILT-IN QUARKUS
# =============================================================
quarkus.http.cors=true
quarkus.http.cors.origins=https://seulamat.dishubaceh.com,https://mudik.dishubaceh.com
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
quarkus.http.cors.headers=origin,content-type,accept,authorization,userid,x-requested-with
quarkus.http.cors.exposed-headers=content-disposition,content-type
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H

# =============================================================
# AUTH PERMISSIONS
# =============================================================
quarkus.http.auth.proactive=false

quarkus.http.auth.permission.public.paths=/api/auth/*,/api/rute,/api/portal/status,/api/feedback/publik,/api/feedback/stats,/api/peta/*
quarkus.http.auth.permission.public.policy=permit

quarkus.http.auth.permission.authenticated.paths=/api/user/*
quarkus.http.auth.permission.authenticated.policy=authenticated

quarkus.http.auth.permission.user-preflight.paths=/api/user/*
quarkus.http.auth.permission.user-preflight.methods=OPTIONS
quarkus.http.auth.permission.user-preflight.policy=permit

# Swagger UI (Production)
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/rfcjgdcjgcjhfchjf