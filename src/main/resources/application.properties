# Folder upload wajib absolute path di VPS
quarkus.http.body.uploads-directory=/opt/mudik-v2/uploads
# Batas ukuran file upload (Set ke 20MB)
quarkus.http.limits.max-body-size=20M
# Timeout request diperlama (biar gak putus tengah jalan pas sinyal bapuk)
quarkus.http.read-timeout=60s

# Nonaktifkan proactive auth ? Quarkus tidak paksa token kecuali endpoint minta
quarkus.http.auth.proactive=false

# =============================================================
# STRATEGI AUTH: /api/* SEMUA PUBLIC
# =============================================================
#
# KENAPA /api/* SEMUA DIBUKA DI SINI?
#
# Resource-resource seperti PendaftaranResource, AdminResource, RuteResource
# TIDAK pakai @Authenticated di class-level. Mereka validasi userId secara
# manual dari header. Kalau endpoint-endpoint ini tidak masuk daftar public,
# Quarkus akan reject dengan 401 sebelum request sampai ke kode Java kita.
#
# Yang BENAR-BENAR butuh token JWT di level Quarkus hanya UserResource
# karena dia pakai @Authenticated. Endpoint itu kita lock di bawah.
#
# Keamanan admin tetap terjaga karena AdminResource validasi role
# secara manual di dalam kode, bukan lewat Quarkus permission.

quarkus.http.auth.permission.public.paths=/api/*
quarkus.http.auth.permission.public.policy=permit

# /api/user/* override: wajib bearer token (karena @Authenticated di UserResource)
quarkus.http.auth.permission.authenticated.paths=/api/user/*
quarkus.http.auth.permission.authenticated.policy=authenticated
