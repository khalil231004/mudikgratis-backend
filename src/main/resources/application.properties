quarkus.http.auth.proactive=false

# --- DAFTAR URL YANG BEBAS AKSES (PUBLIC) ---
# Masukkan semua endpoint disini biar gak dicegat server
# 1. Auth & Umum: Login, Register, Rute
# 2. Pendaftaran User: Riwayat, Upload, QR Code
# 3. Admin: Users, Pendaftar, Verifikasi, Kendaraan, Bus, Stats, Export
quarkus.http.auth.permission.public.paths=\
/api/auth/*,\
/api/rute,\
/api/rute/*,\
/api/pendaftaran/riwayat,\
/api/pendaftaran/uploads/*,\
/api/pendaftaran/uuid/*,\
/api/admin/users,\
/api/admin/users/*,\
/api/admin/pendaftar,\
/api/admin/verifikasi-keluarga/*,\
/api/admin/kendaraan,\
/api/admin/kendaraan/*,\
/api/admin/assign-bus,\
/api/admin/stats,\
/api/admin/export,

# Izinkan semua path diatas (PERMIT)
quarkus.http.auth.permission.public.policy=permit

# --- PREFLIGHT OPTIONS ? WAJIB PUBLIC ---
# Browser mengirim OPTIONS tanpa Authorization header sebelum PUT/POST multipart.
# Jika tidak diizinkan, Quarkus akan reject dengan 401 dan browser
# melaporkannya sebagai CORS error (padahal sebenarnya 401 blocked preflight).
# CorsFilter (@PreMatching) sudah menangkap OPTIONS dan langsung return 200,
# tapi permission ini memastikan request OPTIONS tidak diblokir di layer Quarkus dulu.
quarkus.http.auth.permission.preflight.paths=/api/*
quarkus.http.auth.permission.preflight.policy=permit
quarkus.http.auth.permission.preflight.methods=OPTIONS

# --- DAFTAR URL YANG WAJIB LOGIN ---
# Tambahkan /api/user/* disini aga Satpam tau endpoint ini butuh token
quarkus.http.auth.permission.authenticated.paths=/api/user/*,/api/secure/*
quarkus.http.auth.permission.authenticated.policy=authenticated