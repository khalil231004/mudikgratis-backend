# --- EMAIL ---
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=465
quarkus.mailer.ssl=true
quarkus.mailer.mock=false
quarkus.mailer.from=${MAIL_USERNAME}
quarkus.mailer.username=${MAIL_USERNAME}
quarkus.mailer.password=${MAIL_PASSWORD}

quarkus.http.host=0.0.0.0
quarkus.http.body.uploads-directory=/opt/mudik-v2/uploads
quarkus.http.limits.max-body-size=2M
quarkus.http.read-timeout=300s

# =============================================================
# CORS ? BUILT-IN QUARKUS
# =============================================================
quarkus.http.cors=true
quarkus.http.cors.origins=https://seulamat.dishubaceh.com,https://www.seulamat.dishubaceh.com,https://mudik.dishubaceh.com,https://www.mudik.dishubaceh.com
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
quarkus.http.cors.headers=origin,content-type,accept,authorization,userid,x-requested-with
quarkus.http.cors.exposed-headers=content-disposition,content-type
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H

# =============================================================
# AUTH PERMISSIONS
# =============================================================
# proactive=false: auth check hanya dilakukan jika endpoint membutuhkan
quarkus.http.auth.proactive=false

# FIX: Hapus rule public /api/* yang terlalu luas ? ini bertabrakan
# dengan rule authenticated /api/user/* dan bisa membuat Quarkus
# skip auth check sama sekali, atau sebaliknya menolak token valid.
# Ganti dengan permit hanya untuk path yang memang publik:
quarkus.http.auth.permission.public.paths=/api/auth/*,/api/rute,/api/portal/status,/api/feedback/publik,/api/feedback/stats,/api/peta/*
quarkus.http.auth.permission.public.policy=permit

# /api/user/* wajib token
quarkus.http.auth.permission.authenticated.paths=/api/user/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# CORS FIX: Izinkan OPTIONS preflight untuk /api/user/* tanpa auth
quarkus.http.auth.permission.user-preflight.paths=/api/user/*
quarkus.http.auth.permission.user-preflight.methods=OPTIONS
quarkus.http.auth.permission.user-preflight.policy=permit

