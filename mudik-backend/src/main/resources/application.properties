# ==========================================
# 1. KONFIGURASI DATABASE (Docker)
# ==========================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=khalil
quarkus.datasource.password=khalil123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/db_mudik_gratis

# Agar tabel update otomatis kalau ada perubahan model
#quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.panache.database.default-schema=public

# ==========================================
# 2. KONFIGURASI EMAIL (BACA DARI .ENV) ?
# ==========================================
# Disini kuncinya! Kita pakai ${...} buat ambil data dari file .env
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.mock=false

# Mengambil value MAIL_USERNAME dari file .env
quarkus.mailer.from=${MAIL_USERNAME}
quarkus.mailer.username=${MAIL_USERNAME}

# Mengambil value MAIL_PASSWORD dari file .env (Biar rahasia)
quarkus.mailer.password=${MAIL_PASSWORD}

# ==========================================
# 3. KONFIGURASI SECURITY & JWT (BACA DARI .ENV) ?
# ==========================================
# Ini PENTING biar login gak error
mp.jwt.verify.publickey.location=https://mudik-api.com/key
mp.jwt.verify.issuer=https://mudik-api.com

# Mengambil value JWT_SECRET dari file .env
# 1. Setting Base URL (Ganti pas di warkop/kantor/server)
# Saat masih ngetes di laptop sendiri:
app.base.url=http://172.10.23.19:8080

# 2. JWT Config (Pastikan ini ada)
smallrye.jwt.sign.key=${JWT_SECRET}

# ==========================================
# 4. KONFIGURASI UPLOAD & STATIC FILE ?
# ==========================================
# Lokasi folder upload di laptopmu
quarkus.http.body.uploads-directory=uploads


# ==========================================
# 6. OSRM (PETA)
# ==========================================
quarkus.rest-client.osrm-api.url=http://router.project-osrm.org
quarkus.rest-client.osrm-api.scope=jakarta.inject.Singleton
# Daftarkan folder uploads sebagai sumber daya statis
quarkus.http.static-resources.index-page=index.html
quarkus.http.static-resources.path-handler./uploads=uploads

# Izinkan akses dari IP Address (Bukan cuma localhost)
quarkus.http.host=0.0.0.0
quarkus.dev-ui.hosts=0.0.0.0


